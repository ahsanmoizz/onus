name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux binary
        working-directory: onus
        run: cargo build --release

      - name: Package Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist staging/bin
          cp onus/target/release/onus staging/bin/onus
          cp onus/install/install-onus.sh staging/install-onus.sh
          cp onus/install/uninstall-onus.sh staging/uninstall-onus.sh
          [ -f LICENSE ] && cp LICENSE staging/LICENSE || true
          [ -f README.md ] && cp README.md staging/README.md || true
          tar -czf "dist/onus-${tag}-linux-x86_64.tar.gz" -C staging .
          cp "dist/onus-${tag}-linux-x86_64.tar.gz" "dist/onus-latest-linux-x86_64.tar.gz"
          cp onus/install/install-onus.sh dist/install-onus.sh
          cp onus/install/install.sh dist/install.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows binary
        working-directory: onus
        run: cargo build --release

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "manual" }
          New-Item -ItemType Directory -Force -Path dist, staging\bin | Out-Null
          Copy-Item onus\target\release\onus.exe staging\bin\onus.exe
          Copy-Item onus\install\install-onus.ps1 staging\install-onus.ps1
          Copy-Item onus\install\uninstall-onus.ps1 staging\uninstall-onus.ps1
          if (Test-Path LICENSE) { Copy-Item LICENSE staging\LICENSE }
          if (Test-Path README.md) { Copy-Item README.md staging\README.md }
          Compress-Archive -Path staging\* -DestinationPath "dist\onus-$tag-windows-x86_64.zip" -Force
          Copy-Item "dist\onus-$tag-windows-x86_64.zip" "dist\onus-latest-windows-x86_64.zip"
          Copy-Item onus\install\install-onus.ps1 dist\install-onus.ps1
          Copy-Item onus\install\install.ps1 dist\install.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          for file in *; do
            case "$file" in
              *.sig|*.pem) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "$file.sig" \
              --output-certificate "$file.pem" \
              "$file"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-assets/*
          generate_release_notes: true
