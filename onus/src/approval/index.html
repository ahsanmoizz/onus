<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onus — Pending Approvals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
  header { margin-bottom: 32px; }
  h1 { font-size: 24px; color: #f0f6fc; margin-bottom: 4px; }
  h1 span { color: #f0883e; }
  .subtitle { font-size: 14px; color: #8b949e; }
  .empty { text-align: center; padding: 60px 20px; color: #8b949e; }
  .empty h2 { font-size: 20px; margin-bottom: 8px; }
  .empty p { font-size: 14px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-header h3 { font-size: 16px; color: #f0f6fc; word-break: break-all; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; background: #d29922; color: #fff; white-space: nowrap; }
  .badge.escalate { background: #d29922; }
  .meta { font-size: 13px; color: #8b949e; margin-bottom: 8px; }
  .meta strong { color: #c9d1d9; }
  .payload { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 12px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; color: #8b949e; max-height: 120px; overflow: auto; margin-bottom: 12px; white-space: pre-wrap; word-break: break-all; }
  .correction { background: #1c2128; border-left: 3px solid #d29922; padding: 10px 12px; border-radius: 0 6px 6px 0; font-size: 13px; color: #c9d1d9; margin-bottom: 12px; }
  .actions { display: flex; gap: 10px; }
  .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-approve { background: #238636; color: #fff; }
  .btn-approve:hover:not(:disabled) { background: #2ea043; }
  .btn-reject { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .btn-reject:hover:not(:disabled) { background: #30363d; }
  .resolved { font-size: 13px; color: #8b949e; padding: 4px 0; }
  .resolved.approved { color: #3fb950; }
  .resolved.rejected { color: #f85149; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; font-size: 14px; }
  .status-bar .count { color: #f0883e; font-weight: 600; }
  .status-bar .hint { color: #8b949e; font-size: 12px; }
  .error-msg { color: #f85149; font-size: 13px; margin-bottom: 12px; }
  @media (max-width: 600px) { .container { padding: 20px 12px; } .card-header { flex-direction: column; gap: 8px; } .actions { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Onus <span>Approvals</span></h1>
    <div class="subtitle">Review and approve escalated agent actions</div>
  </header>

  <div class="status-bar" id="statusBar">
    <span><span class="count" id="pendingCount">0</span> pending approvals</span>
    <span class="hint">Auto-refreshes every 3s</span>
  </div>

  <div id="errorMsg" class="error-msg" style="display:none"></div>
  <div id="approvalsList"></div>
</div>

<script>
const POLL_INTERVAL = 3000;

async function fetchPending() {
  const resp = await fetch('/api/pending');
  if (!resp.ok) throw new Error('Failed to fetch pending approvals');
  return await resp.json();
}

async function resolve(actionId, action) {
  const btn = document.querySelector(`[data-action-id="${actionId}"][data-action="${action}"]`);
  if (btn) btn.disabled = true;

  try {
    const resp = await fetch(`/api/${action}/${encodeURIComponent(actionId)}`, { method: 'POST' });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || 'Request failed');
    }
    await render();
  } catch (e) {
    const el = document.getElementById('errorMsg');
    el.textContent = `Error: ${e.message}`;
    el.style.display = 'block';
    if (btn) btn.disabled = false;
  }
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

async function render() {
  const list = document.getElementById('approvalsList');
  const countEl = document.getElementById('pendingCount');
  const errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';

  let approvals;
  try {
    approvals = await fetchPending();
  } catch (e) {
    errorEl.textContent = `Connection error: ${e.message}`;
    errorEl.style.display = 'block';
    list.innerHTML = `<div class="empty"><h2>Waiting for server...</h2><p>Make sure the approval server is running on port 9191.</p></div>`;
    return;
  }

  countEl.textContent = approvals.filter(a => a.status === 'pending').length;

  if (approvals.length === 0) {
    list.innerHTML = `<div class="empty"><h2>No pending approvals</h2><p>Escalated actions will appear here for review.</p></div>`;
    return;
  }

  list.innerHTML = approvals.map(a => {
    const isPending = a.status === 'pending';
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <h3>${escapeHtml(a.tool_name || a.action_type || 'unknown')}</h3>
            <div class="meta">
              Rule: <strong>${escapeHtml(a.rule_name || 'unknown')}</strong> &middot;
              ID: <strong>${escapeHtml(a.action_id || '')}</strong><br>
              Session: <strong>${escapeHtml(a.session_id || '')}</strong>
            </div>
          </div>
          ${isPending ? '<span class="badge escalate">ESCALATED</span>' : ''}
        </div>
        ${a.payload ? `<div class="payload">${escapeHtml(a.payload)}</div>` : ''}
        ${a.correction ? `<div class="correction">${escapeHtml(a.correction)}</div>` : ''}
        ${isPending ? `
          <div class="actions">
            <button class="btn btn-approve" data-action-id="${escapeHtml(a.action_id)}" data-action="approve" onclick="resolve('${escapeHtml(a.action_id)}', 'approve')">Approve</button>
            <button class="btn btn-reject" data-action-id="${escapeHtml(a.action_id)}" data-action="reject" onclick="resolve('${escapeHtml(a.action_id)}', 'reject')">Reject</button>
          </div>
        ` : `
          <div class="resolved ${a.status === 'approved' ? 'approved' : 'rejected'}">
            ${a.status === 'approved' ? 'Approved' : 'Rejected'}
          </div>
        `}
      </div>
    `;
  }).join('');
}

render();
setInterval(render, POLL_INTERVAL);
</script>
</body>
</html>
